<!doctype html>
<html th:lang="${#locale.toLanguageTag}" xmlns:th="https://www.thymeleaf.org">
  <!--
    相关推荐卡片 · v1.6.6-rc.10
    rc.09 验证 data-debug-count-class="java.lang.String" 确认假设: Halo config
    是 String, rc.09 Integer.valueOf 强制转 int 修复字符串拼接 bug.
    rc.09 实测卡片数 = 4 (期望 3). 原因: (count ?: 3) + 1 = 4 作为 pageSize,
    Halo listByCategory 返回 4 条, self-filter 对当前 post 不在结果集时不生效,
    4 条全部通过 → 4 张卡片.
    rc.10 简化: 去掉 + 1, fetch 正好 count 张. vmrack-test 这种 self 不在结果集
    的情况出 count 张 (完美对齐 config); self 偶尔在结果集的 edge case 出 count-1 张
    (可接受).
  -->
  <th:block th:fragment="relate_cards">
    <th:block th:if="${not #lists.isEmpty(post.categories)} or ${not #lists.isEmpty(post.tags)}">
      <span
        style="display: none"
        th:attr="data-debug-rc='rc.10',
                 data-debug-cat-size=${#lists.size(post.categories)},
                 data-debug-tag-size=${#lists.size(post.tags)},
                 data-debug-count-raw=${theme.config.post.post_related_recommend_count},
                 data-debug-count-class=${theme.config.post.post_related_recommend_count != null ? theme.config.post.post_related_recommend_count.getClass().getName() : 'null'}"
      ></span>
      <section class="joe_related">
        <div class="joe_related__title">
          <i class="joe-font joe-icon-huo"></i>
          <span class="text">相关推荐</span>
        </div>
        <div class="joe_related__grid">
          <!-- 有 category: 按第一个 category 推 -->
          <th:block th:if="${not #lists.isEmpty(post.categories)}">
            <th:block th:each="category : ${post.categories.subList(0, 1)}">
              <th:block
                th:with="recommendCountRaw = ${theme.config.post.post_related_recommend_count ?: 3},
                         recommendCountInt = ${T(java.lang.Integer).valueOf(recommendCountRaw.toString())},
                         recommendPosts = ${postFinder.listByCategory(1, recommendCountInt, category.metadata.name)}"
              >
                <a
                  th:each="recommendPost : ${recommendPosts.items}"
                  th:if="${post.metadata.name != recommendPost.metadata.name}"
                  th:with="postCover=${#lists.isEmpty(theme.config.home.post_thumbnail) ? theme.config.basic.random_img_api_url+'?pageid='+recommendPost.metadata.name : theme.config.home.post_thumbnail},
                           cardCover=${recommendPost.spec.cover ?: postCover}"
                  class="joe_related__card"
                  th:href="@{${recommendPost.status.permalink}}"
                  th:title="${recommendPost.spec.title}"
                  target="_blank"
                  rel="noopener noreferrer"
                >
                  <div class="joe_related__card-cover">
                    <img
                      class="lazyload"
                      th:data-src="${cardCover}"
                      th:src="${theme.config.home.lazyload_thumbnail}"
                      th:alt="${recommendPost.spec.title}"
                      onerror="Joe.errorImg(this, 'HomeErrImg')"
                    />
                  </div>
                  <div class="joe_related__card-info">
                    <h4 class="joe_related__card-title">[[${recommendPost.spec.title}]]</h4>
                    <div class="joe_related__card-meta">
                      <time
                        th:datetime="${#dates.format(recommendPost.spec.publishTime,'yyyy-MM-dd')}"
                        >[[${#dates.format(recommendPost.spec.publishTime,'yyyy-MM-dd')}]]</time
                      >
                      <span class="joe_related__card-visit">
                        <i class="joe-font joe-icon-eye"></i>[[${recommendPost.stats.visit}]]
                      </span>
                    </div>
                  </div>
                </a>
              </th:block>
            </th:block>
          </th:block>

          <!-- 无 category 但有 tag: 按第一个 tag 推 -->
          <th:block th:if="${#lists.isEmpty(post.categories)} and ${not #lists.isEmpty(post.tags)}">
            <th:block th:each="tag : ${post.tags.subList(0, 1)}">
              <th:block
                th:with="recommendCountRaw = ${theme.config.post.post_related_recommend_count ?: 3},
                         recommendCountInt = ${T(java.lang.Integer).valueOf(recommendCountRaw.toString())},
                         recommendPosts = ${postFinder.listByTag(1, recommendCountInt, tag.metadata.name)}"
              >
                <a
                  th:each="recommendPost : ${recommendPosts.items}"
                  th:if="${post.metadata.name != recommendPost.metadata.name}"
                  th:with="postCover=${#lists.isEmpty(theme.config.home.post_thumbnail) ? theme.config.basic.random_img_api_url+'?pageid='+recommendPost.metadata.name : theme.config.home.post_thumbnail},
                           cardCover=${recommendPost.spec.cover ?: postCover}"
                  class="joe_related__card"
                  th:href="@{${recommendPost.status.permalink}}"
                  th:title="${recommendPost.spec.title}"
                  target="_blank"
                  rel="noopener noreferrer"
                >
                  <div class="joe_related__card-cover">
                    <img
                      class="lazyload"
                      th:data-src="${cardCover}"
                      th:src="${theme.config.home.lazyload_thumbnail}"
                      th:alt="${recommendPost.spec.title}"
                      onerror="Joe.errorImg(this, 'HomeErrImg')"
                    />
                  </div>
                  <div class="joe_related__card-info">
                    <h4 class="joe_related__card-title">[[${recommendPost.spec.title}]]</h4>
                    <div class="joe_related__card-meta">
                      <time
                        th:datetime="${#dates.format(recommendPost.spec.publishTime,'yyyy-MM-dd')}"
                        >[[${#dates.format(recommendPost.spec.publishTime,'yyyy-MM-dd')}]]</time
                      >
                      <span class="joe_related__card-visit">
                        <i class="joe-font joe-icon-eye"></i>[[${recommendPost.stats.visit}]]
                      </span>
                    </div>
                  </div>
                </a>
              </th:block>
            </th:block>
          </th:block>
        </div>
      </section>
    </th:block>
  </th:block>
</html>
