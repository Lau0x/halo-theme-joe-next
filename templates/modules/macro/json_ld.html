<!doctype html>
<html th:lang="${#locale.toLanguageTag}" xmlns:th="https://www.thymeleaf.org">
  <!--
    JSON-LD structured data · v1.6.8
    Schema types emitted:
      - WebSite   (所有页面 · 含 SearchAction)
      - BlogPosting   (post != null · 文章页)
      - BreadcrumbList   (post != null 且 有 category · 文章页)
    Author 优先取文章作者，其次取主题博主昵称，最后回落到站点标题.
    datePublished 格式: ISO 8601 with JVM 时区 offset (如 +08:00) 用 XXX pattern.
    URL 策略: 绝对化 · cover/logo/permalink 若非 http 开头则 siteUrlClean + path.
    转义策略: th:inline="javascript" 让 Thymeleaf 对字符串自动加双引号 + JS-safe 转义,
             JSON 是 JS 子集, application/ld+json 浏览器按纯数据读, 不执行.
  -->
  <th:block
    th:fragment="json_ld_blocks"
    th:with="siteUrlClean = ${#strings.endsWith(site.url, '/') ? #strings.substring(site.url, 0, #strings.length(site.url) - 1) : site.url},
             jsonAuthor = ${!#strings.isEmpty(theme.config.blogger.nickname) ? theme.config.blogger.nickname : site.title},
             jsonLogo = ${!#strings.isEmpty(site.logo) ? (#strings.startsWith(site.logo, 'http') ? site.logo : siteUrlClean + site.logo) : (!#strings.isEmpty(site.favicon) ? (#strings.startsWith(site.favicon, 'http') ? site.favicon : siteUrlClean + site.favicon) : siteUrlClean + '/favicon.ico')}"
  >
    <!-- 1. WebSite · all pages -->
    <script type="application/ld+json" th:inline="javascript">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": [[${site.title}]],
        "url": [[${siteUrlClean + '/'}]],
        "potentialAction": {
          "@type": "SearchAction",
          "target": {
            "@type": "EntryPoint",
            "urlTemplate": [[${siteUrlClean + '/search?keyword={search_term_string}'}]]
          },
          "query-input": "required name=search_term_string"
        }
      }
    </script>

    <!-- 2. BlogPosting · post-only -->
    <th:block
      th:if="${post != null}"
      th:with="postUrl = ${siteUrlClean + post.status.permalink},
               postImageRaw = ${!#strings.isEmpty(post.spec.cover) ? post.spec.cover : jsonLogo},
               postImage = ${#strings.startsWith(postImageRaw, 'http') ? postImageRaw : siteUrlClean + postImageRaw},
               postDesc = ${!#strings.isEmpty(post.status.excerpt) ? post.status.excerpt : site.seo.description},
               postAuthor = ${post.owner != null and !#strings.isEmpty(post.owner.displayName) ? post.owner.displayName : jsonAuthor},
               datePub = ${post.spec.publishTime != null ? #dates.format(post.spec.publishTime, 'yyyy-MM-dd''T''HH:mm:ssXXX') : ''}"
    >
      <script type="application/ld+json" th:inline="javascript">
        {
          "@context": "https://schema.org",
          "@type": "BlogPosting",
          "headline": [[${post.spec.title}]],
          "description": [[${postDesc}]],
          "image": [[${postImage}]],
          "datePublished": [[${datePub}]],
          "dateModified": [[${datePub}]],
          "author": {
            "@type": "Person",
            "name": [[${postAuthor}]]
          },
          "publisher": {
            "@type": "Organization",
            "name": [[${site.title}]],
            "logo": {
              "@type": "ImageObject",
              "url": [[${jsonLogo}]]
            }
          },
          "mainEntityOfPage": {
            "@type": "WebPage",
            "@id": [[${postUrl}]]
          },
          "url": [[${postUrl}]]
        }
      </script>
    </th:block>

    <!-- 3. BreadcrumbList · post + category only -->
    <th:block
      th:if="${post != null and not #lists.isEmpty(post.categories)}"
      th:with="postUrl = ${siteUrlClean + post.status.permalink},
               firstCatPermalink = ${post.categories[0].status.permalink},
               catUrl = ${#strings.startsWith(firstCatPermalink, 'http') ? firstCatPermalink : siteUrlClean + firstCatPermalink}"
    >
      <script type="application/ld+json" th:inline="javascript">
        {
          "@context": "https://schema.org",
          "@type": "BreadcrumbList",
          "itemListElement": [
            {
              "@type": "ListItem",
              "position": 1,
              "name": "首页",
              "item": [[${siteUrlClean + '/'}]]
            },
            {
              "@type": "ListItem",
              "position": 2,
              "name": [[${post.categories[0].spec.displayName}]],
              "item": [[${catUrl}]]
            },
            {
              "@type": "ListItem",
              "position": 3,
              "name": [[${post.spec.title}]],
              "item": [[${postUrl}]]
            }
          ]
        }
      </script>
    </th:block>
  </th:block>
</html>
