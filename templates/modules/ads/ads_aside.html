<!doctype html>
<html th:lang="${#locale.toLanguageTag}" xmlns:th="https://www.thymeleaf.org">
  <!--
    侧边栏广告 · 扩展 widget enable_ads_aside 类型走这里
    × 关闭按钮由 ad-close.js 接管（data-ad-slot + localStorage 持久化）
  -->
  <th:block th:fragment="ads_aside_img(ads_url, ads_img)">
    <section class="joe_aside__item advert" th:data-ad-slot="${ads_url}">
      <button type="button" class="joe_advert__close" aria-label="关闭此广告" title="关闭此广告">
        &times;
      </button>
      <a
        class="joe_advert"
        target="_blank"
        rel="noopener noreferrer nofollow"
        th:href="${ads_url}"
        title="广告"
      >
        <img
          class="omit lazyload"
          width="100%"
          th:data-src="${ads_img}"
          th:src="${theme.config.home.lazyload_thumbnail}"
          alt="广告"
          onerror="Joe.errorImg(this)"
        />
        <span class="icon">广告</span>
      </a>
    </section>
  </th:block>
  <th:block th:fragment="ads_aside_code(ads_code)">
    <section
      class="joe_aside__item advert"
      th:data-ad-slot="${'code:' + #strings.abbreviate(ads_code ?: '', 80)}"
    >
      <button type="button" class="joe_advert__close" aria-label="关闭此广告" title="关闭此广告">
        &times;
      </button>
      <th:block th:utext="${ads_code}"></th:block>
    </section>
  </th:block>
</html>
