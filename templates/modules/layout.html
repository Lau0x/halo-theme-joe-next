<!doctype html>
<html
  th:lang="${#locale.toLanguageTag}"
  th:fragment="html (title,header,content,head,footer,leftSidebar,htmlType)"
  xmlns:th="http://www.thymeleaf.org"
>
  <head>
    <title th:text="${title}"></title>

    <meta charset="utf-8" />
    <meta name="renderer" content="webkit" />
    <meta name="format-detection" content="email=no" />
    <meta name="format-detection" content="telephone=no" />
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta http-equiv="Cache-Control" content="no-siteapp" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge, chrome=1" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, shrink-to-fit=no, viewport-fit=cover"
    />
    <meta
      name="author"
      th:content="${theme.config.blogger.nickname}"
      th:if="${#strings.trim(theme.config.blogger.nickname)} !=''"
    />
    <meta http-equiv="x-dns-prefetch-control" content="on" />
    <meta name="site" th:content="${site.url}" />

    <!-- Base SEO · description 补齐（原主题只有 og:description） -->
    <meta name="description" th:content="${site.seo.description}" />
    <!-- canonical · 防重复内容惩罚 + 指向权威版本 URL -->
    <link rel="canonical" th:href="${site.url}" />
    <!-- theme-color · 移动端地址栏着色 -->
    <meta name="theme-color" content="#3a63ed" />
    <meta name="msapplication-TileColor" content="#3a63ed" />

    <!--
      Open Graph · 文章页用文章封面 + 摘要，其它页用站点 favicon + 描述
      refs Q5 · Telegram / X 分享预览优化
      用 th:with 计算一次，og/twitter 共用，避免重复三元表达式
    -->
    <th:block
      th:with="ogImage = ${post != null and !#strings.isEmpty(post.spec.cover) ? post.spec.cover : site.favicon},
               ogDesc  = ${post != null and !#strings.isEmpty(post.status.excerpt) ? post.status.excerpt : site.seo.description}"
    >
      <meta property="og:image" th:content="${ogImage}" />
      <!-- Fix upstream bug: was th:content="site.seo.description" (missing ${}),
           rendered the literal string "site.seo.description" as the social
           preview description. Every share to WeChat / X / Facebook showed that
           literal token instead of the actual site description. -->
      <meta property="og:description" th:content="${ogDesc}" />
      <meta property="og:type" th:content="${post != null ? 'article' : 'website'}" />
      <meta property="og:locale" content="zh_CN" />
      <meta property="og:site_name" th:content="${site.title}+'-'+${site.subtitle}" />
      <meta property="og:url" th:content="${site.url}" />
      <meta property="og:title" th:content="${title}" />

      <!-- Twitter Card · summary_large_image 让 X 分享卡显示大图 -->
      <meta name="twitter:card" content="summary_large_image" />
      <meta name="twitter:title" th:content="${title}" />
      <meta name="twitter:description" th:content="${ogDesc}" />
      <meta name="twitter:image" th:content="${ogImage}" />
    </th:block>
    <meta property="twitter:partner" content="ogwp" />
    <!-- /OG -->

    <!--
      Google AdSense Auto Ads (refs Q3)
      仅在 enable_adsense 打开且 client_id 非空时注入主脚本 + preconnect。
      Auto Ads 下位置/lazy 由 Google 端控制，主题侧只负责早期加载主脚本。
    -->
    <th:block
      th:if="${theme.config.ads.enable_adsense} and ${!#strings.isEmpty(theme.config.ads.adsense_client_id)}"
    >
      <link rel="preconnect" href="https://pagead2.googlesyndication.com" crossorigin="" />
      <link rel="preconnect" href="https://googleads.g.doubleclick.net" crossorigin="" />
      <script
        async
        th:src="'https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=' + ${theme.config.ads.adsense_client_id}"
        crossorigin="anonymous"
      ></script>
    </th:block>

    <th:block th:replace="~{modules/config :: config}" />
    <th:block th:replace="~{modules/link :: links}" />
    <!--
      ⚠️ 重要 · 切勿再加 defer 到 jQuery！
      v1.5.1-next.5 曾尝试 defer 导致留言板（journals.js 便利贴初始化）全面挂掉，
      根因：body 内的 <script src> 立即执行，永远**早于** head defer jQuery 执行完，
      导致 common.min.js / journals.min.js / photos.min.js 加载时 $ is not defined。
      正确 FCP 优化需要给 tail.html 里所有 jQuery-dep script 统一加 defer（已 parking）。
    -->
    <script th:src="@{/assets/lib/jquery@3.5.1/jquery.min.js}"></script>
  </head>
  <!-- /OG -->
  <th:block th:replace="${content}"></th:block>
</html>
