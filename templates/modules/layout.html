<!doctype html>
<html
  th:lang="${#locale.toLanguageTag}"
  th:fragment="html (title,header,content,head,footer,leftSidebar,htmlType)"
  xmlns:th="http://www.thymeleaf.org"
>
  <head>
    <title th:text="${title}"></title>

    <meta charset="utf-8" />
    <meta name="renderer" content="webkit" />
    <meta name="format-detection" content="email=no" />
    <meta name="format-detection" content="telephone=no" />
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta http-equiv="Cache-Control" content="no-siteapp" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge, chrome=1" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, shrink-to-fit=no, viewport-fit=cover"
    />
    <meta
      name="author"
      th:content="${theme.config.blogger.nickname}"
      th:if="${#strings.trim(theme.config.blogger.nickname)} !=''"
    />
    <meta http-equiv="x-dns-prefetch-control" content="on" />
    <meta name="site" th:content="${site.url}" />

    <!-- Base SEO · description 补齐（原主题只有 og:description） -->
    <meta name="description" th:content="${site.seo.description}" />
    <!-- canonical · 防重复内容惩罚 + 指向权威版本 URL -->
    <link rel="canonical" th:href="${site.url}" />
    <!-- theme-color · 移动端地址栏着色 -->
    <meta name="theme-color" content="#3a63ed" />
    <meta name="msapplication-TileColor" content="#3a63ed" />

    <!-- Open Graph -->
    <meta property="og:image" th:content="${site.favicon}" />
    <!-- Fix upstream bug: was th:content="site.seo.description" (missing ${}),
         rendered the literal string "site.seo.description" as the social
         preview description. Every share to WeChat / X / Facebook showed that
         literal token instead of the actual site description. -->
    <meta property="og:description" th:content="${site.seo.description}" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="zh_CN" />
    <meta property="og:site_name" th:content="${site.title}+'-'+${site.subtitle}" />
    <meta property="og:url" th:content="${site.url}" />
    <meta property="og:title" th:content="${title}" />

    <!-- Twitter Card · summary_large_image 让 X 分享卡显示大图 -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" th:content="${title}" />
    <meta name="twitter:description" th:content="${site.seo.description}" />
    <meta name="twitter:image" th:content="${site.favicon}" />
    <meta property="twitter:partner" content="ogwp" />
    <!-- /OG -->

    <th:block th:replace="~{modules/config :: config}" />
    <th:block th:replace="~{modules/link :: links}" />
    <!--
      jQuery 加 defer · 取消 render-blocking。
      defer 保证脚本并行下载、按顺序执行、且在 DOMContentLoaded 之前完成。
      所有 body 内的 inline `$()` 调用必须包在 DOMContentLoaded 事件里，
      否则 inline 脚本解析到时 jQuery 还没执行完会 ReferenceError: $ is not defined。
      （目前 page_links.html / links.html 两处 inline 排序脚本已做 DOMContentLoaded guard）
    -->
    <script defer th:src="@{/assets/lib/jquery@3.5.1/jquery.min.js}"></script>
  </head>
  <!-- /OG -->
  <th:block th:replace="${content}"></th:block>
</html>
