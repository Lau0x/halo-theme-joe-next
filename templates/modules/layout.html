<!doctype html>
<html
  th:lang="${#locale.toLanguageTag}"
  th:fragment="html (title,header,content,head,footer,leftSidebar,htmlType)"
  xmlns:th="http://www.thymeleaf.org"
>
  <head>
    <!--
      🧹 遗留 Service Worker 迁移清理（refs v1.5.1-next.15）
      面向"原来是 hexo/wordpress/其它框架、迁移到 Halo+本主题"的博主场景：
      老访客浏览器里可能残留前主题注册的 ServiceWorker + CacheStorage，
      会 intercept network 请求返回缓存的旧 HTML，访客永远看到旧站。
      服务器端 Cache-Control 对已注册的 SW 完全无效（SW 在 network 之前）。
      唯一解法：在浏览器里 unregister SW + 清 caches。

      设计：
      - 必须 inline（external script 会被老 SW 拦截返回 404 或失效）
      - 必须在 <head> 最早位置（最早执行，尽快释放被 SW 劫持的资源）
      - localStorage 标记一次性（已清过的用户再访问 0 开销 early-return）
      - 不支持 SW 的浏览器直接 return（IE / 老 Safari）
      - 清完后 setTimeout 100ms 自动 reload 让新内容立即可见
    -->
    <script>
      (function () {
        if (!('serviceWorker' in navigator)) return;
        var KEY = 'joe3_legacy_sw_cleared_v1';
        try {
          if (localStorage.getItem(KEY)) return;
        } catch (e) {
          return;
        }
        var dirty = false;
        var tasks = [
          navigator.serviceWorker
            .getRegistrations()
            .then(function (regs) {
              if (regs && regs.length) {
                dirty = true;
                return Promise.all(
                  regs.map(function (r) {
                    return r.unregister();
                  })
                );
              }
            })
            .catch(function () {}),
        ];
        if ('caches' in window) {
          tasks.push(
            caches
              .keys()
              .then(function (names) {
                if (names && names.length) {
                  dirty = true;
                  return Promise.all(
                    names.map(function (n) {
                      return caches.delete(n);
                    })
                  );
                }
              })
              .catch(function () {})
          );
        }
        Promise.all(tasks).then(function () {
          try {
            localStorage.setItem(KEY, String(Date.now()));
          } catch (e) {}
          if (dirty) {
            setTimeout(function () {
              location.reload();
            }, 100);
          }
        });
      })();
    </script>

    <title th:text="${title}"></title>

    <meta charset="utf-8" />
    <meta name="renderer" content="webkit" />
    <meta name="format-detection" content="email=no" />
    <meta name="format-detection" content="telephone=no" />
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta http-equiv="Cache-Control" content="no-siteapp" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge, chrome=1" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, shrink-to-fit=no, viewport-fit=cover"
    />
    <meta
      name="author"
      th:content="${theme.config.blogger.nickname}"
      th:if="${#strings.trim(theme.config.blogger.nickname)} !=''"
    />
    <meta http-equiv="x-dns-prefetch-control" content="on" />
    <meta name="site" th:content="${site.url}" />

    <!--
      统一计算本页权威 URL（canonical + og:url 共用）
      - 文章页：站点 URL + 文章 permalink（两端 / 规范化，防双斜杠）
      - 其它页：站点 URL
      Halo 的 site.url 可能带或不带尾 /，permalink 带前导 /，这里统一剥尾 / 再拼接
    -->
    <th:block
      th:with="siteUrlClean = ${#strings.endsWith(site.url, '/') ? #strings.substring(site.url, 0, #strings.length(site.url) - 1) : site.url},
               pageUrl  = ${post != null ? siteUrlClean + post.status.permalink : site.url},
               hasCover = ${post != null and !#strings.isEmpty(post.spec.cover)},
               ogTitle  = ${post != null ? post.spec.title : title},
               ogDesc   = ${post != null and !#strings.isEmpty(post.status.excerpt) ? post.status.excerpt : site.seo.description}"
    >
      <!-- Base SEO · description 补齐（原主题只有 og:description） -->
      <meta name="description" th:content="${ogDesc}" />
      <!-- canonical · 文章页指向文章 URL 而非站点根（SEO 必要，否则 Google 可能降权文章） -->
      <link rel="canonical" th:href="${pageUrl}" />
      <!-- theme-color · 移动端地址栏着色 -->
      <meta name="theme-color" content="#3a63ed" />
      <meta name="msapplication-TileColor" content="#3a63ed" />

      <!-- Open Graph · 文章页用文章封面 + 摘要 + 文章 URL，其它页用站点级 -->
      <!-- v1.6.11.6: og:image 改为条件输出, 仅文章有 cover 时才输出 image 类 meta.
                      原 fallback site.favicon (e.g. 1024x1024 正方形吉祥物) 会被
                      Telegram 当 large preview 撑高预览框, 视觉丑.
                      无 cover 时干脆不输出 og:image → 渲染纯文字紧凑卡片.
                      同时把相对路径绝对化, 防社交媒体抓取器拼错 host. -->
      <th:block
        th:if="${hasCover}"
        th:with="ogImageAbs = ${#strings.startsWith(post.spec.cover, 'http') ? post.spec.cover : siteUrlClean + post.spec.cover}"
      >
        <meta property="og:image" th:content="${ogImageAbs}" />
        <!-- v1.6.9: og:image:alt 提升分享卡辅助文本 + a11y -->
        <meta property="og:image:alt" th:content="${post.spec.title}" />
        <!-- v1.6.9: og:image:type (按 URL 后缀推断) -->
        <meta
          property="og:image:type"
          th:content="${#strings.endsWith(#strings.toLowerCase(ogImageAbs), '.png') ? 'image/png' : (#strings.endsWith(#strings.toLowerCase(ogImageAbs), '.webp') ? 'image/webp' : (#strings.endsWith(#strings.toLowerCase(ogImageAbs), '.gif') ? 'image/gif' : 'image/jpeg'))}"
        />
        <meta name="twitter:image" th:content="${ogImageAbs}" />
        <!-- v1.6.9: twitter:image:alt · X 辅助文本 -->
        <meta name="twitter:image:alt" th:content="${post.spec.title}" />
      </th:block>
      <!-- Fix upstream bug: was th:content="site.seo.description" (missing ${}),
           rendered the literal string "site.seo.description" as the social
           preview description. -->
      <meta property="og:description" th:content="${ogDesc}" />
      <meta property="og:type" th:content="${post != null ? 'article' : 'website'}" />
      <meta property="og:locale" content="zh_CN" />
      <meta property="og:site_name" th:content="${site.title}+'-'+${site.subtitle}" />
      <meta property="og:url" th:content="${pageUrl}" />
      <!-- v1.6.11.6: og:title 改用 ogTitle (post 用 post.spec.title) 而非 ${title}.
                      原 ${title} = "post.spec.title - site.title", 跟 og:site_name
                      重复显示, Telegram 渲染标题超长 + 看着像撞名. -->
      <meta property="og:title" th:content="${ogTitle}" />

      <!-- Twitter Card · summary_large_image 让 X 分享卡显示大图 -->
      <meta name="twitter:card" content="summary_large_image" />
      <meta name="twitter:title" th:content="${ogTitle}" />
      <meta name="twitter:description" th:content="${ogDesc}" />
    </th:block>
    <meta property="twitter:partner" content="ogwp" />
    <!-- /OG -->

    <!--
      JSON-LD structured data · v1.6.8
      Schema.org 富结果(rich results)标记: WebSite(全页) / BlogPosting(文章) / BreadcrumbList(文章).
      独立 fragment 便于未来加 schema type (如 Person / FAQ / HowTo).
    -->
    <th:block th:replace="~{modules/macro/json_ld :: json_ld_blocks}" />

    <!--
      Google AdSense Auto Ads (refs Q3)
      仅在 enable_adsense 打开且 client_id 非空时注入主脚本 + preconnect。
      Auto Ads 下位置/lazy 由 Google 端控制，主题侧只负责早期加载主脚本。
    -->
    <th:block
      th:if="${theme.config.ads.enable_adsense} and ${!#strings.isEmpty(theme.config.ads.adsense_client_id)}"
    >
      <link rel="preconnect" href="https://pagead2.googlesyndication.com" crossorigin="" />
      <link rel="preconnect" href="https://googleads.g.doubleclick.net" crossorigin="" />
      <script
        async
        th:src="'https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=' + ${theme.config.ads.adsense_client_id}"
        crossorigin="anonymous"
      ></script>
    </th:block>

    <th:block th:replace="~{modules/config :: config}" />
    <th:block th:replace="~{modules/link :: links}" />
    <!--
      ⚠️ 重要 · 切勿再加 defer 到 jQuery！
      v1.5.1-next.5 曾尝试 defer 导致留言板（journals.js 便利贴初始化）全面挂掉，
      根因：body 内的 <script src> 立即执行，永远**早于** head defer jQuery 执行完，
      导致 common.min.js / journals.min.js / photos.min.js 加载时 $ is not defined。
      正确 FCP 优化需要给 tail.html 里所有 jQuery-dep script 统一加 defer（已 parking）。
    -->
    <script th:src="@{/assets/lib/jquery@3.7.1/jquery.min.js}"></script>
  </head>
  <!-- /OG -->
  <th:block th:replace="${content}"></th:block>
</html>
