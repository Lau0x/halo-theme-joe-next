# 本地开发 Halo 实例 —— 用于调试本主题
#
# 使用：
#   docker compose -f docker-compose.dev.yml up -d      # 启动
#   docker compose -f docker-compose.dev.yml logs -f    # 看日志
#   docker compose -f docker-compose.dev.yml down       # 关闭（保留数据）
#   docker compose -f docker-compose.dev.yml down -v    # 关闭 + 清数据
#
# 访问：
#   http://localhost:8090           → 前台
#   http://localhost:8090/console   → 后台（首次访问会走 setup 创建管理员）
#
# 主题开发流程（不用 bind mount —— Halo 备份恢复和 ro mount 冲突）：
#   1. 本地改 templates/*.html 或 less/js 源码
#   2. 改 less/js 后先跑 `pnpm build-only`
#   3. `./scripts/theme-sync.sh` —— 把本地改动同步进容器的 themes/ 目录
#   4. 前台刷新立即生效（Halo Thymeleaf 热加载）

services:
  halo:
    image: halohub/halo:2.24
    container_name: halo-joe-dev
    restart: unless-stopped
    ports:
      - "8090:8090"
    volumes:
      # Halo 数据目录（数据库、附件、配置、themes）
      - halo2-data:/root/.halo2
    environment:
      - HALO_EXTERNAL_URL=http://localhost:8090/
      - HALO_SECURITY_INITIALIZER_SUPERADMINUSERNAME=admin
      - HALO_SECURITY_INITIALIZER_SUPERADMINPASSWORD=halo-dev-2026
      - JVM_OPTS=-Xmx512m -Xms256m
    command:
      # H2 file URL：用 ~/ 表示容器内 root 家目录，避免 r2dbc→jdbc 解析掉开头 /
      - --spring.r2dbc.url=r2dbc:pool:h2:file:///~/.halo2/db/halo-next?MODE=MySQL&DB_CLOSE_ON_EXIT=FALSE
      - --spring.r2dbc.username=admin
      - --spring.r2dbc.password=admin
      - --spring.sql.init.platform=h2
      - --halo.external-url=http://localhost:8090/

volumes:
  halo2-data:
    name: halo-joe-dev-data
