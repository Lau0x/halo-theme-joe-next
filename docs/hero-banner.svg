<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 1600 480"
  width="1600"
  height="480"
  role="img"
  aria-label="Halo Theme Joe3 · Next — A community-maintained Halo blog theme"
>
  <!--
    Hero banner · halo-theme-joe-next
    色调对齐 blog.laoda.de 主色 #2A64F6 (品牌蓝, CSS var theme)
    辅色 #8b5cf6 (紫), #9999ff (浅蓝紫, 暗色模式 theme)
    状态色保留绿 #22c55e (healthy 状态通用语义, 不冲突)
    修复 Community Fork 徽章 rect 加宽到 228 · text-anchor middle 防止多语言字符宽度漂移导致溢出
  -->
  <defs>
    <!-- 主背景: 深 slate 偏蓝, 稳重 -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>

    <!-- 品牌蓝 radial 光晕 (左下) -->
    <radialGradient id="accentBlue" cx="15%" cy="85%" r="55%">
      <stop offset="0%" stop-color="#2A64F6" stop-opacity="0.4" />
      <stop offset="70%" stop-color="#2A64F6" stop-opacity="0.04" />
      <stop offset="100%" stop-color="#2A64F6" stop-opacity="0" />
    </radialGradient>

    <!-- 辅色紫 radial 光晕 (右上) 避免单色疲劳 -->
    <radialGradient id="accentViolet" cx="82%" cy="15%" r="50%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.32" />
      <stop offset="70%" stop-color="#8b5cf6" stop-opacity="0.03" />
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0" />
    </radialGradient>

    <!-- 斜网格 pattern -->
    <pattern id="grid" x="0" y="0" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1" />
    </pattern>

    <!-- 标题渐变: 白 → 品牌蓝 (呼应博客 CSS var theme) -->
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="55%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#60a5fa" />
    </linearGradient>

    <!-- Window mockup glow -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- 背景层叠 -->
  <rect width="1600" height="480" fill="url(#bg)" />
  <rect width="1600" height="480" fill="url(#grid)" />
  <rect width="1600" height="480" fill="url(#accentBlue)" />
  <rect width="1600" height="480" fill="url(#accentViolet)" />

  <!-- ========== 左侧文字区 ========== -->
  <!-- 顶部小徽章: Community Fork · 社区接棒 (已加宽到 228 防溢出) -->
  <g transform="translate(100, 80)">
    <rect
      x="0" y="0" width="228" height="32"
      rx="16" ry="16"
      fill="#2A64F6" fill-opacity="0.13"
      stroke="#2A64F6" stroke-opacity="0.42" stroke-width="1"
    />
    <circle cx="18" cy="16" r="3.5" fill="#60a5fa" />
    <text
      x="122" y="21"
      font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif"
      font-size="13" font-weight="500" fill="#93c5fd"
      letter-spacing="0.3" text-anchor="middle"
    >Community Fork · 社区接棒</text>
  </g>

  <!-- 主标题 -->
  <text
    x="100" y="210"
    font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="92" font-weight="700" fill="url(#titleGrad)"
    letter-spacing="-2"
  >Theme Joe3 · Next</text>

  <!-- 副标 (英文) -->
  <text
    x="100" y="255"
    font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="22" font-weight="400" fill="#cbd5e1"
    letter-spacing="0.2"
  >A community-maintained Halo blog theme, continued with care.</text>

  <!-- 副标 (中文) -->
  <text
    x="100" y="290"
    font-family="ui-sans-serif, system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif"
    font-size="18" font-weight="400" fill="#94a3b8"
    letter-spacing="1"
  >Halo 2.x 博客主题 · 卡片化 · 响应式 · 深色模式 · 文章目录 · 评论系统</text>

  <!-- 底部徽章组 -->
  <g transform="translate(100, 340)" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="500">
    <!-- CC BY-NC-SA 4.0 -->
    <g>
      <rect x="0" y="0" width="140" height="30" rx="15" fill="#1e293b" stroke="#334155" stroke-width="1" />
      <text x="70" y="20" fill="#e2e8f0" text-anchor="middle">CC BY-NC-SA 4.0</text>
    </g>
    <!-- Halo ≥ 2.22.2 -->
    <g transform="translate(152, 0)">
      <rect x="0" y="0" width="130" height="30" rx="15" fill="#1e293b" stroke="#334155" stroke-width="1" />
      <text x="65" y="20" fill="#e2e8f0" text-anchor="middle">Halo ≥ 2.22.2</text>
    </g>
    <!-- 积极维护 · 绿色保留 (healthy 状态通用语义, 不跟主色撞) -->
    <g transform="translate(294, 0)">
      <rect x="0" y="0" width="120" height="30" rx="15"
        fill="#22c55e" fill-opacity="0.13"
        stroke="#22c55e" stroke-opacity="0.42" stroke-width="1" />
      <circle cx="14" cy="15" r="3" fill="#22c55e">
        <animate attributeName="opacity" values="1;0.35;1" dur="2s" repeatCount="indefinite" />
      </circle>
      <text x="68" y="20" fill="#86efac" text-anchor="middle">积极维护中</text>
    </g>
  </g>

  <!-- ========== 右侧 window mockup ========== -->
  <g transform="translate(1010, 110)" filter="url(#glow)">
    <!-- 主 window card -->
    <rect
      x="0" y="0" width="500" height="260"
      rx="14" ry="14"
      fill="#0b1221"
      stroke="#334155" stroke-width="1"
      stroke-opacity="0.6"
    />
    <!-- macOS 三圆 -->
    <circle cx="22" cy="22" r="6" fill="#ff5f57" fill-opacity="0.9" />
    <circle cx="42" cy="22" r="6" fill="#febc2e" fill-opacity="0.9" />
    <circle cx="62" cy="22" r="6" fill="#28c840" fill-opacity="0.9" />
    <!-- 地址栏占位 -->
    <rect x="110" y="14" width="280" height="16" rx="8" fill="#1e293b" />
    <text
      x="250" y="25"
      font-family="ui-monospace, 'SF Mono', Consolas, monospace"
      font-size="10" fill="#64748b" text-anchor="middle"
    >blog.example.com</text>

    <!-- 内容区: 卡片网格示意 (accent bar 改品牌蓝) -->
    <g transform="translate(24, 56)">
      <!-- Hero 大卡 -->
      <rect x="0" y="0" width="452" height="80" rx="8"
        fill="#1e293b" stroke="#334155" stroke-width="0.5" />
      <rect x="14" y="18" width="90" height="8" rx="4" fill="#2A64F6" fill-opacity="0.8" />
      <rect x="14" y="36" width="240" height="6" rx="3" fill="#475569" />
      <rect x="14" y="50" width="180" height="6" rx="3" fill="#334155" />

      <!-- 小卡 × 3 -->
      <rect x="0" y="92" width="145" height="78" rx="8"
        fill="#1e293b" stroke="#334155" stroke-width="0.5" />
      <rect x="10" y="10" width="125" height="36" rx="4"
        transform="translate(0, 92)"
        fill="#334155" />
      <rect x="10" y="54" width="90" height="6" rx="3"
        transform="translate(0, 92)"
        fill="#94a3b8" />
      <rect x="10" y="66" width="60" height="5" rx="2"
        transform="translate(0, 92)"
        fill="#475569" />

      <rect x="153" y="92" width="145" height="78" rx="8"
        fill="#1e293b" stroke="#334155" stroke-width="0.5" />
      <rect x="163" y="102" width="125" height="36" rx="4" fill="#334155" />
      <rect x="163" y="146" width="100" height="6" rx="3" fill="#94a3b8" />
      <rect x="163" y="158" width="70" height="5" rx="2" fill="#475569" />

      <rect x="306" y="92" width="146" height="78" rx="8"
        fill="#1e293b" stroke="#334155" stroke-width="0.5" />
      <rect x="316" y="102" width="126" height="36" rx="4" fill="#334155" />
      <rect x="316" y="146" width="80" height="6" rx="3" fill="#94a3b8" />
      <rect x="316" y="158" width="55" height="5" rx="2" fill="#475569" />
    </g>
  </g>

  <!-- ========== 右下版本戳 ========== -->
  <g transform="translate(1484, 438)" font-family="ui-monospace, 'SF Mono', Consolas, monospace" font-size="12">
    <text x="0" y="0" fill="#64748b" text-anchor="end">v1.5.1-next.20 · Apr 2026</text>
  </g>
</svg>
