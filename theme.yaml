apiVersion: theme.halo.run/v1alpha1
kind: Theme
metadata:
  name: theme-Joe3
  # Removed: store.halo.run/app-id annotation
  #
  # Upstream (Jiewenhuang) published Theme Joe3 to the Halo App Store under
  # app-ZxiPb. If this fork kept that annotation, every user of Joe3 Next
  # would see an "upgrade available" prompt pointing back to the upstream
  # app-store listing and silently lose all our fixes on one click.
  #
  # Three options for reintroducing an upgrade channel in the future:
  #   (a) Publish this fork as a new Halo App Store app (requires dev
  #       account + submission review at halo.run/developers)
  #   (b) Host our own update manifest and point Halo at it (if/when
  #       Halo supports a self-hosted update-feed annotation)
  #   (c) Keep manual: users watch the GitHub repo releases page for
  #       notifications, pull the zip, upgrade via Console.
  #
  # Until (a) lands, (c) is the safe default.
spec:
  displayName: Theme Joe3 Next
  author:
    name: Roy Leo (continued from Jiewenhuang)
    website: 'https://blog.laoda.de'
  description: 'Community-maintained continuation of Halo Theme Joe3, originally by Jiewenhuang. Adds features and fixes while upstream is inactive.'
  logo: 'https://wmimg.com/i/70/2023/08/64d3c41d5bde2.webp'
  homepage: 'https://blog.laoda.de'
  repo: 'https://github.com/Lau0x/halo-theme-joe-next'
  issues: 'https://github.com/Lau0x/halo-theme-joe-next/issues'
  license:
    - name: CC BY-NC-SA 4.0
      url: 'https://creativecommons.org/licenses/by-nc-sa/4.0/'
  settingName: 'theme-Joe-setting'
  configMapName: 'theme-Joe-configMap'
  version: '1.6.4-rc.02'
  requires: '>=2.22.2'
  customTemplates:
    page:
      - name: 留言板
        description: 留言板文章
        screenshot:
        file: page_leaving.html
      - name: 友链
        description: 友链模板
        screenshot:
        file: page_links.html
