name: Release

# 打 tag (v*) 时触发：构建 theme zip → 创建 GitHub Release → 上传 zip 作为 asset
# 用法：
#   git tag v1.6.0
#   git push origin v1.6.0
# → 几分钟后 releases 页面出现 v1.6.0，附 halo-theme-joe3-1.6.0.zip

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (must already exist)'
        required: true

permissions:
  contents: write   # 创建 release 需要

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
          # Need full history so `git describe --tags` can find the previous
          # release tag to build the commit list in the release body.
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm (via Corepack)
        run: |
          corepack enable
          corepack prepare --activate

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store/v3
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build theme zip
        run: pnpm build

      - name: Locate theme zip
        id: find-zip
        run: |
          zip_file=$(ls -1 dist/*.zip 2>/dev/null | head -n1)
          if [ -z "$zip_file" ]; then
            echo "::error::No theme zip in dist/"
            ls -la dist/ 2>/dev/null || echo "(dist/ missing)"
            exit 1
          fi
          echo "zip=$zip_file" >> "$GITHUB_OUTPUT"
          echo "Release zip: $zip_file ($(du -h "$zip_file" | cut -f1))"

      - name: Build commit list since previous tag
        id: commits
        run: |
          # We commit direct to main without PRs, so GitHub's auto
          # "What's Changed" section is empty. Generate our own from
          # `git log` between previous release tag and current tag.
          git fetch --tags --force --quiet
          current_tag="${{ inputs.tag || github.ref_name }}"
          previous_tag=$(git describe --tags --abbrev=0 "${current_tag}^" 2>/dev/null || true)
          if [ -z "$previous_tag" ]; then
            log=$(git log --no-merges --pretty="- %s ([\`%h\`](https://github.com/${{ github.repository }}/commit/%H))" "${current_tag}")
            range="initial release up to ${current_tag}"
          else
            log=$(git log --no-merges --pretty="- %s ([\`%h\`](https://github.com/${{ github.repository }}/commit/%H))" "${previous_tag}..${current_tag}")
            range="${previous_tag} → ${current_tag}"
          fi
          {
            echo "commits<<EOF"
            echo "$log"
            echo "EOF"
            echo "range=${range}"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          name: ${{ inputs.tag || github.ref_name }}
          files: ${{ steps.find-zip.outputs.zip }}
          # 不用 GitHub 的自动 release notes —— 它只对带 PR 的 merge 有效。
          # 我们走 direct-to-main，所以自己 git log 生成列表。
          generate_release_notes: false
          draft: false
          prerelease: ${{ contains(inputs.tag || github.ref_name, '-') }}
          body: |
            ## 本次变更（${{ steps.commits.outputs.range }}）

            ${{ steps.commits.outputs.commits }}

            [查看完整 diff](https://github.com/${{ github.repository }}/compare/${{ steps.commits.outputs.range }})

            ---

            ## 安装 / 升级

            下方 `theme-Joe3-*.zip` 直接在 Halo Console → 外观 → 主题 → 安装/升级 中上传。
            升级覆盖保留所有配置（metadata.name / settingName / configMapName 不变）。

            ## 获取更新通知

            本主题暂未登陆 Halo 官方应用市场，Halo 后台不会推送升级提示。
            请在本仓库右上角 **Watch → Custom → Releases** 订阅，新版本发布时 GitHub 会邮件通知你。

