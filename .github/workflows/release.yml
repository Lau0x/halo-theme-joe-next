name: Release

# 打 tag (v*) 时触发：构建 theme zip → 创建 GitHub Release → 上传 zip 作为 asset
# 用法：
#   git tag v1.6.0
#   git push origin v1.6.0
# → 几分钟后 releases 页面出现 v1.6.0，附 halo-theme-joe3-1.6.0.zip

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (must already exist)'
        required: true

permissions:
  contents: write   # 创建 release 需要

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}
          # Need full history so `git describe --tags` can find the previous
          # release tag to build the commit list in the release body.
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup pnpm (via Corepack)
        run: |
          corepack enable
          corepack prepare --activate

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ~/.local/share/pnpm/store/v3
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build theme zip
        run: pnpm build

      - name: Locate theme zip
        id: find-zip
        run: |
          zip_file=$(ls -1 dist/*.zip 2>/dev/null | head -n1)
          if [ -z "$zip_file" ]; then
            echo "::error::No theme zip in dist/"
            ls -la dist/ 2>/dev/null || echo "(dist/ missing)"
            exit 1
          fi
          echo "zip=$zip_file" >> "$GITHUB_OUTPUT"
          echo "Release zip: $zip_file ($(du -h "$zip_file" | cut -f1))"

      - name: Build commit list + tag highlight since previous tag
        id: commits
        run: |
          # We commit direct to main without PRs, so GitHub's auto
          # "What's Changed" section is empty. Generate our own from
          # `git log` between previous release tag and current tag.
          git fetch --tags --force --quiet
          current_tag="${{ inputs.tag || github.ref_name }}"
          previous_tag=$(git describe --tags --abbrev=0 "${current_tag}^" 2>/dev/null || true)
          if [ -z "$previous_tag" ]; then
            log=$(git log --no-merges --pretty="- %s ([\`%h\`](https://github.com/${{ github.repository }}/commit/%H))" "${current_tag}")
            human_range="initial release up to ${current_tag}"
            diff_path="${current_tag}"
          else
            log=$(git log --no-merges --pretty="- %s ([\`%h\`](https://github.com/${{ github.repository }}/commit/%H))" "${previous_tag}..${current_tag}")
            human_range="${previous_tag} → ${current_tag}"
            diff_path="${previous_tag}...${current_tag}"
          fi

          # If the release tag is annotated (git tag -a vX.Y.Z -m "..."), extract
          # the message body as a release-specific highlight. Lightweight tags
          # yield an empty string — skipped silently.
          tag_type=$(git cat-file -t "${current_tag}" 2>/dev/null || echo "")
          if [ "$tag_type" = "tag" ]; then
            highlight=$(git tag -l --format='%(contents)' "${current_tag}" | sed '/^-----BEGIN PGP/,$d')
          else
            highlight=""
          fi

          {
            echo "commits<<EOF"
            echo "$log"
            echo "EOF"
            echo "human_range=${human_range}"
            echo "diff_path=${diff_path}"
            echo "highlight<<EOF"
            echo "$highlight"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          name: ${{ inputs.tag || github.ref_name }}
          files: ${{ steps.find-zip.outputs.zip }}
          # 不用 GitHub 的自动 release notes —— 它只对带 PR 的 merge 有效。
          # 我们走 direct-to-main，所以自己 git log 生成列表。
          generate_release_notes: false
          draft: false
          prerelease: ${{ contains(inputs.tag || github.ref_name, '-') }}
          body: |
            ${{ steps.commits.outputs.highlight }}

            ## 本次变更（${{ steps.commits.outputs.human_range }}）

            ${{ steps.commits.outputs.commits }}

            [查看完整 diff](https://github.com/${{ github.repository }}/compare/${{ steps.commits.outputs.diff_path }})

            ---

            ## 🚨 升级注意事项

            - ✅ **配置不会丢**：`metadata.name` / `settingName` / `configMapName` 全部与上游 Joe3 一致，升级是 Halo 的"同主题覆盖"行为，后台所有设置（博主信息、Waline Token、颜色等）都保留
            - 📦 **建议升级前先备份**：Halo Console → 工具 → 备份与恢复 → 创建备份。万一视觉改动不喜欢，5 秒可回滚
            - ⬇️ **回退方法**：从 [Releases 页](https://github.com/${{ github.repository }}/releases) 下载旧版 zip 重新上传即可
            - ⚠️ **新增 setting 字段**：升级后 "主题设置"里可能出现新选项，默认值安全（不启用），需要时再开
            - 🚫 **别重复升级到官方市场版**：本 fork 已拆除 `store.halo.run/app-id` 避免反向升级，但如果你从 halo.run/store 安装过原版 Joe3 再覆盖本 fork，可能混装——建议先卸载原版再安装本 fork

            ## 安装 / 升级

            下方 `theme-Joe3-*.zip` 直接在 Halo Console → 外观 → 主题 → 安装/升级 中上传。

            ## 获取更新通知

            本主题暂未登陆 Halo 官方应用市场，Halo 后台不会推送升级提示。
            请在本仓库右上角 **Watch → Custom → Releases** 订阅，新版本发布时 GitHub 会邮件通知你。

